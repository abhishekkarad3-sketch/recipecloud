services:
  - type: web
    name: recipecloud
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm serve
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
